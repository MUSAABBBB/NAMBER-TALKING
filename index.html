<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأرقام تتكلم 🔢</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.15);
    --white: #fffffe;
    --muted: rgba(255,255,255,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    overflow: hidden;
  }

  /* ─── PARTICLES ─── */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .particle {
    position: absolute;
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    color: rgba(245,200,66,0.06);
    animation: floatUp linear infinite;
    user-select: none;
  }
  @keyframes floatUp {
    from { transform: translateY(110vh); opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    to   { transform: translateY(-10vh); opacity: 0; }
  }

  /* ─── MAIN CARD ─── */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  /* ─── TOP LABEL ─── */
  .label {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    opacity: 0.8;
  }

  /* ─── BIG NUMBER DISPLAY ─── */
  .num-stage {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 2rem;
    cursor: pointer;
  }

  .num-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid var(--gold);
    animation: spinRing 8s linear infinite;
    opacity: 0.25;
  }
  .num-ring::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    top: -6px; left: 50%;
    transform: translateX(-50%);
  }
  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  .num-glow {
    position: absolute;
    inset: 20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,200,66,0.18) 0%, transparent 70%);
    transition: all 0.4s;
  }

  .num-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7rem;
    font-weight: 900;
    color: var(--gold);
    transition: all 0.3s;
    text-shadow: 0 0 40px rgba(245,200,66,0.5);
    line-height: 1;
  }

  .num-stage:hover .num-glow {
    background: radial-gradient(circle, rgba(245,200,66,0.3) 0%, transparent 70%);
  }
  .num-stage:hover .num-ring { opacity: 0.6; }

  /* ─── SPEECH AREA ─── */
  .speech-box {
    background: var(--surface);
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: 20px;
    padding: 1.8rem 2rem;
    margin-bottom: 1.5rem;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color 0.3s;
  }

  .speech-box.active { border-color: rgba(245,200,66,0.6); }

  .num-name {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.4s 0.1s;
  }

  .speech-text {
    font-size: 1.15rem;
    line-height: 1.8;
    color: var(--white);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s 0.2s;
  }

  .speech-placeholder {
    color: var(--muted);
    font-size: 1rem;
    transition: opacity 0.3s;
  }

  .speech-box.show .num-name,
  .speech-box.show .speech-text {
    opacity: 1;
    transform: translateY(0);
  }
  .speech-box.show .speech-placeholder { display: none; }

  /* ─── TAG ─── */
  .tag {
    display: inline-block;
    background: var(--gold-dim);
    color: var(--gold);
    border-radius: 50px;
    padding: 0.25rem 1rem;
    font-size: 0.82rem;
    font-weight: 700;
    margin-top: 0.7rem;
    opacity: 0;
    transform: scale(0.85);
    transition: all 0.4s 0.3s;
  }
  .speech-box.show .tag { opacity: 1; transform: scale(1); }

  /* ─── NAV BUTTONS ─── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .nav-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(245,200,66,0.3);
    background: transparent;
    color: var(--gold);
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Cairo', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    transform: scale(1.1);
  }

  .dots {
    display: flex;
    gap: 0.5rem;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }

  /* ─── GRID SELECTOR ─── */
  .grid-selector {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .grid-btn {
    aspect-ratio: 1;
    border-radius: 14px;
    border: 2px solid rgba(245,200,66,0.15);
    background: var(--surface);
    color: var(--white);
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .grid-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .grid-btn:hover { border-color: var(--gold); transform: translateY(-3px); }
  .grid-btn.active {
    border-color: var(--gold);
    background: var(--gold);
    color: var(--bg);
  }

  /* ─── SPEAK BTN ─── */
  .speak-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 14px;
    border: none;
    background: var(--gold);
    color: var(--bg);
    font-size: 1.1rem;
    font-weight: 900;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .speak-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,200,66,0.3); }
  .speak-btn:active { transform: translateY(0); }
  .speak-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ─── QUESTION MODAL ─── */
  .question-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,14,23,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(4px);
  }
  .question-overlay.open { display: flex; }

  .question-card {
    background: var(--surface);
    border: 1px solid rgba(245,200,66,0.4);
    border-radius: 24px;
    padding: 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    animation: popIn 0.35s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .q-num { font-size: 4rem; font-weight: 900; color: var(--gold); margin-bottom: 0.5rem; }
  .q-question { font-size: 1.15rem; line-height: 1.8; margin-bottom: 2rem; color: var(--white); }
  .q-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
  .q-ans {
    padding: 0.9rem;
    border-radius: 12px;
    border: 2px solid rgba(245,200,66,0.2);
    background: transparent;
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .q-ans:hover { border-color: var(--gold); color: var(--gold); }
  .q-ans.correct { background: #2d9e6b; border-color: #2d9e6b; color: white; }
  .q-ans.wrong   { background: #e63946; border-color: #e63946; color: white; }
  .q-result { font-size: 1.1rem; font-weight: 700; min-height: 1.5rem; }
  .q-close {
    margin-top: 1.2rem;
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted);
    border-radius: 8px;
    padding: 0.5rem 1.5rem;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
  }
  .q-close:hover { border-color: var(--white); color: var(--white); }

  /* ─── CONFETTI STARS ─── */
  .star {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-size: 1.5rem;
    animation: starFly 1s ease forwards;
  }
  @keyframes starFly {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-120px) scale(0.3); }
  }

  /* ─── PULSE ANIMATION ─── */
  @keyframes numPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .num-text.pop { animation: numPop 0.4s ease; }
</style>
</head>
<body>

<div id="particles"></div>

<div class="card">
  <div class="label">🔢 الأرقام تتكلم</div>

  <!-- Big number -->
  <div class="num-stage" onclick="openQuestion()">
    <div class="num-ring"></div>
    <div class="num-glow"></div>
    <div class="num-text" id="numDisplay">?</div>
  </div>

  <!-- Speech bubble -->
  <div class="speech-box" id="speechBox">
    <span class="speech-placeholder">اختر رقمًا واضغط «تكلّم» 👇</span>
    <div class="num-name" id="numName"></div>
    <div class="speech-text" id="speechText"></div>
    <span class="tag" id="numTag"></span>
  </div>

  <!-- Nav arrows + dots -->
  <div class="nav">
    <button class="nav-btn" onclick="navigate(-1)">◀</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" onclick="navigate(1)">▶</button>
  </div>

  <!-- Grid selector -->
  <div class="grid-selector" id="grid"></div>

  <!-- Speak button -->
  <button class="speak-btn" id="speakBtn" onclick="speak()">🎤 تكلّم!</button>
</div>

<!-- Quiz Modal -->
<div class="question-overlay" id="overlay">
  <div class="question-card">
    <div class="q-num" id="qNum"></div>
    <div class="q-question" id="qQuestion"></div>
    <div class="q-answers" id="qAnswers"></div>
    <div class="q-result" id="qResult"></div>
    <button class="q-close" onclick="closeQuestion()">إغلاق ✕</button>
  </div>
</div>

<script>
const numbers = [
  {
    n: '0', name: 'الصفر', tag: 'الأساس',
    speech: 'أنا الصفر — صغير بس مهم! بدوني ما في عشرة ولا مئة ولا مليون! من يحتقر الصفر لا يفهم الأرقام! 💪',
    question: 'ماذا يحدث لو أضفتني لآخر أي رقم؟',
    answers: ['يقل بمقدار الواحد', 'يتضاعف عشرة أضعاف', 'لا شيء يتغير', 'يصبح صفراً'],
    correct: 1
  },
  {
    n: '1', name: 'الواحد', tag: 'البداية',
    speech: 'أنا الرقم الأول — البداية! كل شيء عظيم في الكون بدأ بواحد. أنا الوحيد اللي لو ضربت فيه أي رقم، الرقم يفضل زي ما هو! 👑',
    question: 'ما نتيجة أي رقم مضروباً في الواحد؟',
    answers: ['يتضاعف', 'يصبح صفراً', 'نفس الرقم', 'يزيد واحداً'],
    correct: 2
  },
  {
    n: '2', name: 'الاثنان', tag: 'التعاون',
    speech: 'أنا رقم الثنائيات! الأيدي اثنتان، العيون اثنتان، الجناحان اثنان. التعاون والشراكة هي قوتي! وكل رقم زوجي هو من عائلتي! 🤝',
    question: 'ما الأرقام الزوجية من 1 إلى 10؟',
    answers: ['1،3،5،7،9', '2،4،6،8،10', '1،2،3،4،5', '5،6،7،8،9'],
    correct: 1
  },
  {
    n: '3', name: 'الثلاثة', tag: 'القوة',
    speech: 'أنا رقم الثلاثة — قوة المثلث! لو أردت استقراراً أحتجت لي. الكرسي يحتاج ثلاث أرجل، والقصص لها بداية ووسط ونهاية! 🔺',
    question: 'كم زاوية في المثلث؟',
    answers: ['٢', '٤', '٣', '٥'],
    correct: 2
  },
  {
    n: '4', name: 'الأربعة', tag: 'الاتجاهات',
    speech: 'أنا رقم الاتجاهات! شمال، جنوب، شرق، وغرب — بدوني تضيع! والمربع؟ ذلك الشكل المتوازن؟ أضلاعه الأربعة هديتي للهندسة! 🧭',
    question: 'كم ضلعاً في المربع؟',
    answers: ['٣', '٥', '٦', '٤'],
    correct: 3
  },
  {
    n: '5', name: 'الخمسة', tag: 'اليومي',
    speech: 'أنا رقم يدك! انظر إلى كفك — خمسة أصابع. كل يوم تستخدمني وأنت تحسب على أصابعك. الطبيعة تعشقني أيضاً في أوراق النجمة! ✋',
    question: 'كم أصبعاً في اليدين معاً؟',
    answers: ['٨', '١٠', '١٢', '٦'],
    correct: 1
  },
  {
    n: '6', name: 'الستة', tag: 'الطبيعة',
    speech: 'أنا رقم الطبيعة السري! خلية النحل سداسية، الندفة الثلجية لها ستة أطراف. الطبيعة اختارتني لأنني الأكثر كفاءة! 🐝',
    question: 'كم ضلعاً في خلية النحل السداسية؟',
    answers: ['٤', '٨', '٦', '٥'],
    correct: 2
  },
  {
    n: '7', name: 'السبعة', tag: 'الحظ',
    speech: 'أنا رقم الحظ والأسرار! عجائب الدنيا سبع، ألوان قوس قزح سبعة، أيام الأسبوع سبعة. الحضارات كلها أحبتني! 🌈',
    question: 'كم لوناً في قوس قزح؟',
    answers: ['٥', '٦', '٨', '٧'],
    correct: 3
  },
  {
    n: '8', name: 'الثمانية', tag: 'اللانهاية',
    speech: 'أنا رقم اللانهاية! إذا نمت على جنبي صرت ♾️. الأخطبوط يحملني في أذرعته الثمانية، وعنكبوت الشبكة يمشي على ثماني أرجل! ♾️',
    question: 'ما رمز اللانهاية؟',
    answers: ['⊕', '♾️', '∆', '≈'],
    correct: 1
  },
  {
    n: '9', name: 'التسعة', tag: 'السحر',
    speech: 'أنا الرقم الساحر! اضرب فيّ أي رقم ثم اجمع أرقام الناتج — ستحصل عليّ دائماً! جرّب: 9×5=45، و4+5=9! ✨',
    question: 'ما ناتج 9 × 3، ثم جمع أرقام الناتج؟',
    answers: ['8', '9', '7', '6'],
    correct: 1
  },
];

let current = -1; // -1 = none selected

// ─── BUILD PARTICLES ───
const pContainer = document.getElementById('particles');
for (let i = 0; i < 25; i++) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = Math.floor(Math.random() * 10);
  const size = Math.random() * 70 + 30;
  el.style.cssText = `font-size:${size}px;left:${Math.random()*100}%;animation-duration:${Math.random()*18+10}s;animation-delay:${Math.random()*15}s`;
  pContainer.appendChild(el);
}

// ─── BUILD GRID ───
const grid = document.getElementById('grid');
numbers.forEach((num, i) => {
  const btn = document.createElement('button');
  btn.className = 'grid-btn';
  btn.id = `gb-${i}`;
  btn.textContent = num.n;
  btn.onclick = () => selectNumber(i);
  grid.appendChild(btn);
});

// ─── BUILD DOTS ───
const dotsEl = document.getElementById('dots');
numbers.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.id = `dot-${i}`;
  d.onclick = () => selectNumber(i);
  dotsEl.appendChild(d);
});

function selectNumber(i) {
  current = i;
  const num = numbers[i];

  // Update big display
  const numText = document.getElementById('numDisplay');
  numText.textContent = num.n;
  numText.classList.remove('pop');
  void numText.offsetWidth;
  numText.classList.add('pop');

  // Update grid buttons
  document.querySelectorAll('.grid-btn').forEach((b, idx) => {
    b.classList.toggle('active', idx === i);
  });

  // Update dots
  document.querySelectorAll('.dot').forEach((d, idx) => {
    d.classList.toggle('active', idx === i);
  });

  // Hide speech while waiting for speak btn
  const box = document.getElementById('speechBox');
  box.classList.remove('show', 'active');
  document.getElementById('numName').textContent = '';
  document.getElementById('speechText').textContent = '';
  document.getElementById('numTag').textContent = '';
  document.querySelector('.speech-placeholder').style.display = '';

  document.getElementById('speakBtn').disabled = false;
}

function speak() {
  if (current < 0) return;
  const num = numbers[current];
  const box = document.getElementById('speechBox');

  document.getElementById('numName').textContent = `أنا «${num.name}»`;
  document.getElementById('speechText').textContent = num.speech;
  document.getElementById('numTag').textContent = num.tag;
  document.querySelector('.speech-placeholder').style.display = 'none';

  box.classList.add('active');
  requestAnimationFrame(() => box.classList.add('show'));

  // Web Speech API (optional, works in most browsers)
  if ('speechSynthesis' in window) {
    const utt = new SpeechSynthesisUtterance(num.speech);
    utt.lang = 'ar-SA';
    utt.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  }
}

function navigate(dir) {
  const next = current < 0 ? (dir > 0 ? 0 : 9) : (current + dir + 10) % 10;
  selectNumber(next);
}

// ─── QUIZ ───
function openQuestion() {
  if (current < 0) return;
  const num = numbers[current];
  document.getElementById('qNum').textContent = num.n;
  document.getElementById('qQuestion').textContent = num.question;
  document.getElementById('qResult').textContent = '';

  const answersEl = document.getElementById('qAnswers');
  answersEl.innerHTML = '';
  num.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-ans';
    btn.textContent = ans;
    btn.onclick = () => checkAnswer(i, num.correct, answersEl);
    answersEl.appendChild(btn);
  });

  document.getElementById('overlay').classList.add('open');
}

function checkAnswer(selected, correct, container) {
  const btns = container.querySelectorAll('.q-ans');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === selected) b.classList.add('wrong');
  });
  const resultEl = document.getElementById('qResult');
  if (selected === correct) {
    resultEl.textContent = '🎉 إجابة صحيحة! أحسنت!';
    resultEl.style.color = '#2d9e6b';
    spawnStars();
  } else {
    resultEl.textContent = '❌ حاول مرة أخرى!';
    resultEl.style.color = '#e63946';
  }
}

function closeQuestion() {
  document.getElementById('overlay').classList.remove('open');
}

function spawnStars() {
  const emojis = ['⭐','🌟','✨','💫','🎊'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'star';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top = (30 + Math.random() * 40) + '%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }, i * 80);
  }
}

// Start with number 0 shown but not spoken
selectNumber(0);
</script>
</body>
</html>
